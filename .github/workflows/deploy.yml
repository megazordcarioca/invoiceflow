name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.actor != 'dependabot[bot]')
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: team_wdgHc2sjHegc2ZqCgDGV6mAm
          vercel-project-id: prj_JbOpIEnFNvBeT8s1iCW2VlBmzg8Z
          vercel-args: ${{ github.event_name == 'push' && '--prod' || '' }}
