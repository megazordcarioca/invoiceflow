name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: invoiceflow/package-lock.json
      - run: npm ci
        working-directory: invoiceflow
      - run: npx prettier --check .
        working-directory: invoiceflow
      - run: npx next lint
        working-directory: invoiceflow
